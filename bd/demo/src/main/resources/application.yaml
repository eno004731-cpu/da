spring:
  application:
    name: legal-services-demo

  datasource:
    # По умолчанию локальный запуск остаётся как раньше.
    # В Docker эти значения удобно переопределять через env.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/legal_crm}
    username: ${SPRING_DATASOURCE_USERNAME:legal_user}
    password: ${SPRING_DATASOURCE_PASSWORD:legal_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: 8080

app:
  storage:
    # Папка для документов заказов. По умолчанию остаётся внутри проекта, но путь теперь можно
    # переопределить через APP_STORAGE_ORDERS_DIR или в systemd env без правки Java-кода.
    orders-dir: ${APP_STORAGE_ORDERS_DIR:uploads/orders}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG
