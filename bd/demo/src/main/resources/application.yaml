spring:
  application:
    name: legal-services-demo

  datasource:
    url: jdbc:postgresql://localhost:5432/legal_crm
    username: legal_user
    password: legal_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
